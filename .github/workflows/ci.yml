name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Verify dist is up to date
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/server.js is out of date. Run 'npm run build' locally and commit the result."
            git diff dist/
            exit 1
          fi

      - name: Smoke test
        run: |
          node dist/server.js &
          sleep 2
          curl -sf http://localhost:4873/health
          kill %1
