name: npm-ripe-guard
description: Start a local npm registry proxy that blocks packages published less than 24 hours ago.
author: npm-ripe-guard

inputs:
  port:
    description: Port to run the proxy on
    required: false
    default: '4873'

runs:
  using: composite
  steps:
    - name: Start npm-ripe-guard
      shell: bash
      env:
        PORT: ${{ inputs.port }}
        LOG_LEVEL: warn
      run: |
        node "${{ github.action_path }}/dist/server.js" &
        echo $! > /tmp/npm-ripe-guard.pid

        echo "Waiting for npm-ripe-guard to be ready..."
        for i in $(seq 1 15); do
          if curl -sf "http://localhost:${PORT}/health" > /dev/null 2>&1; then
            echo "npm-ripe-guard is ready on port ${PORT}"
            break
          fi
          sleep 1
        done

        echo "NPM_CONFIG_REGISTRY=http://localhost:${PORT}" >> "$GITHUB_ENV"
        echo "npm_config_registry=http://localhost:${PORT}" >> "$GITHUB_ENV"
        echo "PNPM_CONFIG_REGISTRY=http://localhost:${PORT}" >> "$GITHUB_ENV"
        echo "pnpm_config_registry=http://localhost:${PORT}" >> "$GITHUB_ENV"

        # Best effort npm soft filter (hard blocking still happens in the proxy).
        if command -v npm >/dev/null 2>&1; then
          if npm config ls -l | grep -q '^min-release-age'; then
            npm config set min-release-age 1
            echo "NPM_CONFIG_MIN_RELEASE_AGE=1" >> "$GITHUB_ENV"
            echo "npm_config_min_release_age=1" >> "$GITHUB_ENV"
          else
            echo "::notice::Skipping npm min-release-age (requires npm >= 11.10.0)."
          fi
        fi

        # Best effort pnpm soft filter. Older pnpm may ignore this key.
        if command -v pnpm >/dev/null 2>&1; then
          if pnpm config set minimum-release-age 1 >/dev/null 2>&1; then
            echo "PNPM_CONFIG_MINIMUM_RELEASE_AGE=1" >> "$GITHUB_ENV"
            echo "pnpm_config_minimum_release_age=1" >> "$GITHUB_ENV"
          else
            echo "::notice::Skipping pnpm minimum-release-age (unsupported by this pnpm version)."
          fi
        fi

branding:
  icon: shield
  color: green
